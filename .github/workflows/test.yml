name: Automation Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  ensure-company-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Ensure ASCOM exists in company core
        run: |
          FINAL=$(curl -s "https://api.peviitor.ro/v1/company/?cif=38652516" | jq '.total | length')
          if [ "$FINAL" -ge "1" ]; then
            echo "✅ SUCCESS: ASCOM is in company core"
          else
            echo "❌ FAILED: ASCOM still not in company core"
            exit 1
          fi
    timeout-minutes: 2

  validate-jobs:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: Automation-Tests
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Validate Ascom jobs in SOLR
        run: node tests/validate-ascom-jobs.js
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

  Automation-Tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run Unit Tests
        run: npm run test:unit
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: test-report.html
      - name: Run Integration Tests
        run: npm run test:integration
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        continue-on-error: true
      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test-report.html
      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        continue-on-error: true
      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-report.html
