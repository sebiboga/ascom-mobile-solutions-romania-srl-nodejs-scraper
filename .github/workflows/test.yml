name: Automation Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ensure-company-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Ensure ASCOM exists in company core
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://api.peviitor.ro/v1/company/?cif=38652516" || true
          echo "Company core check done"
    timeout-minutes: 2

  validate-jobs:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    if: ${{ false }}
    steps:
      - run: echo "Skipped until SOLR validation is ready"

  Automation-Tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Run Unit Tests
        run: npm run test:unit
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: test-report.html
      - name: Run Integration Tests
        run: npm run test:integration
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        continue-on-error: true
      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test-report.html
      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        continue-on-error: true
      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-report.html
